<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Builder</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="app.css">
</head>
<body>
    <div class="app-shell">
        <header class="app-topbar d-flex align-items-center justify-content-between">
            <div class="d-flex align-items-center gap-3">
                <h1 class="app-title mb-0">Query Builder</h1>
                <span class="text-muted small">Schema designer</span>
            </div>
            <div class="d-flex align-items-center gap-2">
                <button class="btn btn-light btn-sm topbar-btn" type="button">＋</button>
                <button class="btn btn-light btn-sm topbar-btn" type="button">☰</button>
                <button class="btn btn-light btn-sm topbar-btn" type="button">⌕</button>
            </div>
        </header>

        <main class="container-fluid py-3">
            <div class="row g-3 app-columns">
                <div class="col-xl-4 col-lg-5" id="left-panel">
                    <section class="panel-card h-100">
                        <div class="panel-head">
                            <div class="row g-2 mb-2">
                                <div class="col-6">
                                    <label class="form-label tiny-label">Program</label>
                                    <select class="form-select form-select-sm">
                                        <option>CRM</option>
                                        <option>Sales</option>
                                    </select>
                                </div>
                                <div class="col-6">
                                    <label class="form-label tiny-label">Document</label>
                                    <select class="form-select form-select-sm">
                                        <option>Contract</option>
                                        <option>Application</option>
                                    </select>
                                </div>
                            </div>
                            <div class="d-flex gap-2 flex-wrap">
                                <button id="add-property" class="btn btn-sm btn-outline-primary">+ Property</button>
                                <button id="add-object" class="btn btn-sm btn-outline-secondary">+ Object</button>
                                <button id="add-array" class="btn btn-sm btn-outline-success">+ Array</button>
                                <button id="delete-node" class="btn btn-sm btn-outline-danger">Delete</button>
                            </div>
                        </div>

                        <div class="panel-body">
                            <div id="tree-container" class="tree-container"></div>
                        </div>
                    </section>
                </div>

                <div class="col-xl-4 col-lg-7" id="center-panel">
                    <section class="panel-card h-100">
                        <div class="panel-head d-flex align-items-center justify-content-between">
                            <h2 class="panel-title mb-0">Form Preview</h2>
                            <span class="badge text-bg-light border">Live</span>
                        </div>
                        <div class="panel-body preview-area">
                            <div id="form-preview"></div>
                        </div>
                    </section>
                </div>

                <div class="col-xl-4 col-lg-12" id="right-panel">
                    <section class="panel-card h-100">
                        <div class="panel-head p-0">
                            <ul class="nav nav-tabs px-3 pt-3" id="right-tabs" role="tablist">
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link active" type="button" data-bs-toggle="tab" data-bs-target="#diagram-tab">Diagram</button>
                                </li>
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link" type="button" data-bs-toggle="tab" data-bs-target="#json-editor-tab">JSON</button>
                                </li>
                            </ul>
                        </div>

                        <div class="panel-body tab-content">
                            <div class="tab-pane fade show active" id="diagram-tab">
                                <div class="diagram-placeholder">
                                    <div id="diagram-canvas" class="diagram-canvas"></div>
                                </div>
                            </div>
                            <div class="tab-pane fade" id="json-editor-tab">
                                <div class="d-flex justify-content-end gap-2 mb-2">
                                    <button id="copy-json" class="btn btn-sm btn-outline-secondary">Copy</button>
                                    <button id="import-json" class="btn btn-sm btn-outline-primary">Import</button>
                                    <button id="export-json" class="btn btn-sm btn-outline-success">Export</button>
                                </div>
                                <textarea id="json-editor" class="form-control json-textarea" rows="18"></textarea>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </main>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
    <script type="module" src="src/js/main.js"></script>
</body>
</html>
